<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>椛橙麵包團購管理</title>
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap');

  :root {
    --cream: #fdf6ec;
    --warm: #f5e6cc;
    --brown: #6b4226;
    --brown-light: #9c6644;
    --brown-pale: #c4956a;
    --green: #5a7a5a;
    --green-light: #7a9e7a;
    --red: #c0392b;
    --text: #2c1a0e;
    --border: #e0c9a8;
    --shadow: rgba(107,66,38,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--cream);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  /* TABS */
  .tab-bar {
    display: flex;
    background: var(--brown);
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px var(--shadow);
  }
  .tab-bar button {
    flex: 1;
    padding: 14px 8px;
    border: none;
    background: transparent;
    color: rgba(255,255,255,0.65);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all .2s;
    border-bottom: 3px solid transparent;
  }
  .tab-bar button.active {
    color: #fff;
    border-bottom: 3px solid var(--brown-pale);
    background: rgba(255,255,255,0.08);
  }

  .page { display: none; padding: 16px; }

  /* HEADER */
  .shop-header {
    text-align: center;
    padding: 20px 0 12px;
  }
  .shop-header h1 {
    font-family: 'Noto Serif TC', serif;
    font-size: 26px;
    color: var(--brown);
    letter-spacing: 4px;
  }
  .shop-header p {
    color: var(--brown-light);
    font-size: 12px;
    margin-top: 4px;
    letter-spacing: 1px;
  }
  .shop-header a.ig-link {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    margin-top: 8px;
    color: var(--brown-light);
    font-size: 12px;
    text-decoration: none;
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    background: #fff;
    transition: border-color .2s, color .2s;
  }
  .shop-header a.ig-link:hover { border-color: var(--brown-pale); color: var(--brown); }

  /* ORDER FORM */
  .section-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 15px;
    color: var(--brown);
    border-left: 3px solid var(--brown-pale);
    padding-left: 8px;
    margin: 18px 0 10px;
    letter-spacing: 2px;
  }

  .name-row {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
    align-items: center;
  }
  .name-row label { font-size: 13px; white-space: nowrap; color: var(--brown); }
  .name-row input {
    flex: 1;
    padding: 8px 12px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: #fff;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: border-color .2s;
  }
  .name-row input:focus { border-color: var(--brown-pale); }

  /* MENU ITEMS */
  .category-block { margin-bottom: 8px; }
  .cat-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--brown-light);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .menu-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    margin-bottom: 6px;
    transition: border-color .2s, box-shadow .2s;
  }
  .menu-item:hover { border-color: var(--brown-pale); box-shadow: 0 2px 8px var(--shadow); }
  .item-info { flex: 1; }
  .item-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.4;
  }
  .item-name .badge {
    display: inline-block;
    font-size: 9px;
    background: var(--warm);
    color: var(--brown-light);
    border-radius: 4px;
    padding: 1px 5px;
    margin-left: 4px;
    vertical-align: middle;
    font-weight: 400;
  }
  .item-price {
    font-size: 12px;
    color: var(--brown-light);
    margin-top: 2px;
  }
  .qty-ctrl {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .qty-ctrl button {
    width: 26px; height: 26px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: var(--cream);
    color: var(--brown);
    font-size: 16px;
    line-height: 1;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s, border-color .15s;
  }
  .qty-ctrl button:hover { background: var(--warm); border-color: var(--brown-pale); }
  .qty-display {
    width: 24px;
    text-align: center;
    font-size: 14px;
    font-weight: 500;
    color: var(--brown);
  }

  /* SUBMIT */
  .submit-btn {
    width: 100%;
    padding: 14px;
    margin-top: 16px;
    background: var(--brown);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-family: 'Noto Serif TC', serif;
    font-size: 15px;
    letter-spacing: 3px;
    cursor: pointer;
    transition: background .2s, transform .1s;
  }
  .submit-btn:hover { background: var(--brown-light); }
  .submit-btn:active { transform: scale(0.98); }

  /* ORDERS LIST */
  .summary-bar {
    background: var(--brown);
    color: #fff;
    border-radius: 10px;
    padding: 12px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .summary-bar .s-label { font-size: 12px; opacity: .8; }
  .summary-bar .s-val { font-size: 20px; font-family: 'Noto Serif TC', serif; }
  .summary-bar .s-block { text-align: center; }

  .filter-row {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
  }
  .filter-btn {
    flex: 1;
    padding: 7px 4px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: #fff;
    font-size: 12px;
    color: var(--brown-light);
    cursor: pointer;
    transition: all .15s;
  }
  .filter-btn.active {
    background: var(--brown);
    color: #fff;
    border-color: var(--brown);
  }

  .order-card {
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 10px;
    position: relative;
    transition: box-shadow .2s;
  }
  .order-card.paid { border-left: 4px solid var(--green); }
  .order-card.unpaid { border-left: 4px solid #e0c9a8; }
  .order-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 8px;
  }
  .order-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--brown);
    font-family: 'Noto Serif TC', serif;
  }
  .order-time { font-size: 11px; color: #aaa; margin-top: 2px; }

  .order-items-list { margin-bottom: 10px; }
  .order-item-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text);
    padding: 2px 0;
    border-bottom: 1px dashed var(--border);
  }
  .order-item-row:last-child { border-bottom: none; }

  .order-bottom {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .order-total {
    font-size: 15px;
    font-weight: 600;
    color: var(--brown);
  }

  .pay-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .pay-toggle label { font-size: 12px; color: var(--brown-light); }
  .toggle-switch {
    position: relative;
    width: 40px; height: 22px;
  }
  .toggle-switch input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute;
    cursor: pointer;
    inset: 0;
    background: #ddd;
    border-radius: 22px;
    transition: background .2s;
  }
  .toggle-slider:before {
    content: '';
    position: absolute;
    width: 16px; height: 16px;
    left: 3px; top: 3px;
    background: #fff;
    border-radius: 50%;
    transition: transform .2s;
    box-shadow: 0 1px 3px rgba(0,0,0,.2);
  }
  .toggle-switch input:checked + .toggle-slider { background: var(--green); }
  .toggle-switch input:checked + .toggle-slider:before { transform: translateX(18px); }

  .del-btn {
    background: none;
    border: none;
    color: #ccc;
    font-size: 16px;
    cursor: pointer;
    padding: 0 0 0 8px;
    transition: color .2s;
  }
  .del-btn:hover { color: var(--red); }

  /* STATS */
  .stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }
  .stat-card {
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    text-align: center;
  }
  .stat-card .s-num {
    font-size: 26px;
    font-family: 'Noto Serif TC', serif;
    color: var(--brown);
    font-weight: 700;
  }
  .stat-card .s-desc { font-size: 11px; color: var(--brown-light); margin-top: 3px; }

  .popular-list .pop-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 12px;
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    margin-bottom: 6px;
    font-size: 13px;
  }
  .pop-bar-wrap { flex: 1; margin: 0 10px; height: 6px; background: var(--warm); border-radius: 3px; overflow: hidden; }
  .pop-bar { height: 100%; background: var(--brown-pale); border-radius: 3px; transition: width .5s; }

  /* EXPORT */
  .export-area {
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 12px;
  }
  .export-area textarea {
    width: 100%;
    height: 200px;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 12px;
    color: var(--text);
    resize: none;
    background: var(--cream);
  }
  .copy-btn {
    width: 100%;
    margin-top: 8px;
    padding: 10px;
    background: var(--green);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 13px;
    cursor: pointer;
    letter-spacing: 2px;
  }
  .copy-btn:hover { background: var(--green-light); }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--brown);
    color: #fff;
    padding: 10px 22px;
    border-radius: 24px;
    font-size: 13px;
    letter-spacing: 1px;
    opacity: 0;
    transition: all .3s;
    z-index: 9999;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* CONFIRM MODAL */
  .confirm-modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(44,26,14,0.6);
    z-index: 9000;
    align-items: flex-end;
    justify-content: center;
  }
  .confirm-modal-overlay.show { display: flex; }
  .confirm-modal {
    background: var(--cream);
    border-radius: 20px 20px 0 0;
    padding: 24px 20px 32px;
    width: 100%;
    max-width: 480px;
    max-height: 85vh;
    overflow-y: auto;
    animation: slideUp .3s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .confirm-modal-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 17px;
    color: var(--brown);
    text-align: center;
    letter-spacing: 3px;
    margin-bottom: 16px;
  }
  .confirm-modal-name {
    text-align: center;
    font-size: 13px;
    color: var(--brown-light);
    margin-bottom: 12px;
  }
  .confirm-modal-items {
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 12px;
  }
  .confirm-modal-total {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--warm);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 16px;
  }
  .confirm-modal-total span:first-child { font-size: 14px; color: var(--brown); }
  .confirm-modal-total span:last-child { font-size: 20px; font-family: 'Noto Serif TC', serif; color: var(--brown); font-weight: 700; }
  .confirm-btns { display: flex; gap: 10px; }
  .confirm-btns button:first-child {
    flex: 1; padding: 12px; border: 1.5px solid var(--border);
    background: #fff; border-radius: 12px; color: var(--brown-light);
    font-size: 14px; cursor: pointer;
  }
  .confirm-btns button:last-child {
    flex: 2; padding: 12px; border: none;
    background: var(--brown); border-radius: 12px; color: #fff;
    font-family: 'Noto Serif TC', serif; font-size: 14px;
    letter-spacing: 2px; cursor: pointer;
  }

  .empty-msg {
    text-align: center;
    color: #bbb;
    font-size: 13px;
    padding: 40px 0;
  }

  /* ADMIN */
  .admin-header {
    background: linear-gradient(135deg, var(--brown) 0%, var(--brown-light) 100%);
    padding: 18px 20px 14px;
    color: #fff;
  }
  .admin-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 17px;
    letter-spacing: 3px;
    color: #fff;
  }

  .sub-tab-bar {
    display: flex;
    background: var(--warm);
    border-bottom: 2px solid var(--border);
  }
  .sub-tab {
    flex: 1;
    padding: 11px 6px;
    border: none;
    background: transparent;
    color: var(--brown-light);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: all .2s;
    margin-bottom: -2px;
  }
  .sub-tab.active {
    color: var(--brown);
    font-weight: 700;
    border-bottom: 3px solid var(--brown);
    background: var(--cream);
  }
</style>
</head>
<body>

<div class="tab-bar">
  <button class="active" onclick="switchMain('order')">🛒 下訂單</button>
  <button onclick="switchMain('query')">🔍 查詢訂單</button>
  <button onclick="requestAdmin()">⚙️ 管理後台</button>
</div>

<!-- ORDER PAGE -->
<div id="page-order" class="page active">
  <div class="shop-header">
    <h1>椛 橙</h1>
    <p>麵包、甜點 ✿ 小菜＿免運團購</p>
    <a class="ig-link" href="https://www.instagram.com/lafeuilleorange?igsh=MTEyeWN2aGgyMGlhOA==" target="_blank">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>
      @lafeuilleorange
    </a>
  </div>

  <div class="section-title">訂購人</div>
  <div class="name-row">
    <label>姓名</label>
    <input type="text" id="buyer-name" placeholder="請輸入姓名">
  </div>

  <div id="menu-container"></div>

  <div style="background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;margin-top:12px;">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <span style="font-size:14px;color:var(--brown);font-weight:600;">本次小計</span>
      <span id="order-subtotal" style="font-size:20px;font-family:'Noto Serif TC',serif;color:var(--brown);font-weight:700;">NT$0</span>
    </div>
  </div>

  <button class="submit-btn" onclick="submitOrder()">確認送出訂單</button>
</div>

<!-- QUERY PAGE -->
<div id="page-query" class="page">
  <div class="shop-header">
    <h1>椛 橙</h1>
    <p>訂單查詢</p>
  </div>

  <div class="section-title">輸入姓名查詢</div>
  <div class="name-row">
    <label>姓名</label>
    <input type="text" id="query-name" placeholder="請輸入您的姓名" onkeydown="if(event.key==='Enter')queryOrder()">
  </div>
  <button class="submit-btn" onclick="queryOrder()" style="margin-top:0">🔍 查詢</button>

  <div id="query-result" style="margin-top:16px;"></div>
</div>

<!-- LIST PAGE -->
<div id="page-list" class="page" style="display:none">
  <div id="summary-bar-container"></div>
  <div class="filter-row">
    <button class="filter-btn active" id="filter-all" onclick="setFilter('all')">全部</button>
    <button class="filter-btn" id="filter-unpaid" onclick="setFilter('unpaid')">未付款</button>
    <button class="filter-btn" id="filter-paid" onclick="setFilter('paid')">已付款</button>
  </div>
  <div id="orders-container"></div>
</div>

<!-- STATS PAGE -->
<div id="page-stats" class="page" style="display:none">
  <div class="section-title">統計總覽</div>
  <div id="stats-container"></div>
</div>

<!-- EXPORT PAGE -->
<div id="page-export" class="page" style="display:none">
  <div class="section-title">匯出訂單</div>
  <div class="export-area">
    <textarea id="export-text" readonly></textarea>
    <button class="copy-btn" onclick="copyExport()">複製到剪貼簿</button>
  </div>
  <button class="submit-btn" style="background:var(--red);margin-top:0" onclick="clearAllOrders()">⚠ 清除所有訂單（新一輪）</button>
</div>

<!-- ADMIN SHELL -->
<div id="page-admin" class="page" style="padding:0;">
  <div class="admin-header">
    <div class="admin-title">⚙️ 管理後台</div>
  </div>
  <div class="sub-tab-bar">
    <button class="sub-tab active" id="stab-list" onclick="switchSub('list')">📋 訂單列表</button>
    <button class="sub-tab" id="stab-stats" onclick="switchSub('stats')">📊 統計</button>
    <button class="sub-tab" id="stab-export" onclick="switchSub('export')">📤 匯出</button>
  </div>
  <div id="admin-body" style="padding:16px;"></div>
</div>

<!-- CONFIRM ORDER MODAL -->
<div class="confirm-modal-overlay" id="confirm-overlay" onclick="if(event.target===this)closeConfirm()">
  <div class="confirm-modal">
    <div class="confirm-modal-title">✦ 訂單確認 ✦</div>
    <div class="confirm-modal-name" id="confirm-name"></div>
    <div class="confirm-modal-items" id="confirm-items"></div>
    <div class="confirm-modal-total">
      <span>合計金額</span>
      <span id="confirm-total"></span>
    </div>
    <div class="confirm-btns">
      <button onclick="closeConfirm()">返回修改</button>
      <button onclick="confirmSubmit()">確認送出</button>
    </div>
  </div>
</div>

<!-- PASSWORD MODAL -->
<div id="pw-overlay" style="display:none;position:fixed;inset:0;background:rgba(44,26,14,0.55);z-index:9000;align-items:center;justify-content:center;">
  <div style="background:var(--cream);border-radius:18px;padding:28px 24px;width:280px;box-shadow:0 8px 32px rgba(107,66,38,0.25);text-align:center;">
    <div style="font-family:'Noto Serif TC',serif;font-size:18px;color:var(--brown);letter-spacing:3px;margin-bottom:6px;">管理後台</div>
    <div style="font-size:12px;color:var(--brown-light);margin-bottom:18px;">請輸入密碼</div>
    <input id="pw-input" type="password" placeholder="••••"
      style="width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:22px;letter-spacing:8px;text-align:center;background:#fff;color:var(--brown);outline:none;font-family:'Noto Sans TC',sans-serif;"
      onkeydown="if(event.key==='Enter')checkPassword()">
    <div id="pw-error" style="color:#c0392b;font-size:12px;margin-top:8px;min-height:16px;"></div>
    <div style="display:flex;gap:10px;margin-top:14px;">
      <button onclick="closePasswordModal()" style="flex:1;padding:10px;border:1.5px solid var(--border);background:#fff;border-radius:10px;color:var(--brown-light);font-size:13px;cursor:pointer;">取消</button>
      <button onclick="checkPassword()" style="flex:1;padding:10px;border:none;background:var(--brown);color:#fff;border-radius:10px;font-size:13px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;">進入</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ---- FIREBASE CONFIG ----
const firebaseConfig = {

// ---- RENDER MENU ----
function renderMenu() {
  const c = document.getElementById('menu-container');
  c.innerHTML = '';
  MENU.forEach(cat => {
    const block = document.createElement('div');
    block.className = 'category-block';
    block.innerHTML = `<div class="section-title">${cat.cat}</div>`;
    cat.items.forEach(item => {
      const key = item.name;
      if (!quantities[key]) quantities[key] = 0;
      const row = document.createElement('div');
      row.className = 'menu-item';
      row.innerHTML = `
        <div class="item-info">
          <div class="item-name">${item.name}${item.badge ? `<span class="badge">${item.badge}</span>` : ''}${item.note ? `<span class="badge" style="background:#e8f5e9;color:var(--green)">${item.note}</span>` : ''}</div>
          <div class="item-price">NT$${item.price}</div>
        </div>
        <div class="qty-ctrl">
          <button onclick="changeQty('${key.replace(/'/g,"\\'")}', -1)">−</button>
          <div class="qty-display" id="qty-${encodeKey(key)}">0</div>
          <button onclick="changeQty('${key.replace(/'/g,"\\'")}', 1)">＋</button>
        </div>
      `;
      block.appendChild(row);
    });
    c.appendChild(block);
  });
}

function encodeKey(k) {
  // Use a stable hash to avoid collisions between Chinese item names
  let hash = 0;
  for (let i = 0; i < k.length; i++) {
    hash = ((hash << 5) - hash) + k.charCodeAt(i);
    hash |= 0;
  }
  return 'item_' + Math.abs(hash);
}

function changeQty(name, delta) {
  if (!quantities[name]) quantities[name] = 0;
  quantities[name] = Math.max(0, quantities[name] + delta);
  const el = document.getElementById('qty-' + encodeKey(name));
  if (el) el.textContent = quantities[name];
  updateSubtotal();
}

function updateSubtotal() {
  let total = 0;
  MENU.forEach(cat => cat.items.forEach(item => {
    total += (quantities[item.name] || 0) * item.price;
  }));
  document.getElementById('order-subtotal').textContent = 'NT$' + total;
}

// ---- SUBMIT ORDER ----
let pendingOrder = null;

function submitOrder() {
  const name = document.getElementById('buyer-name').value.trim();
  if (!name) { showToast('請輸入姓名'); return; }
  const items = [];
  MENU.forEach(cat => cat.items.forEach(item => {
    if (quantities[item.name] > 0) {
      items.push({ name: item.name, qty: quantities[item.name], price: item.price });
    }
  }));
  if (items.length === 0) { showToast('請至少選擇一項商品'); return; }
  const total = items.reduce((s, i) => s + i.qty * i.price, 0);

  // Store pending and show confirm modal
  pendingOrder = { id: Date.now(), name, items, total, paid: false, time: new Date().toLocaleString('zh-TW') };

  document.getElementById('confirm-name').textContent = `訂購人：${name}`;
  document.getElementById('confirm-items').innerHTML = items.map(i => `
    <div class="order-item-row">
      <span>${i.name} × ${i.qty}</span>
      <span>NT$${i.qty * i.price}</span>
    </div>
  `).join('');
  document.getElementById('confirm-total').textContent = `NT$${total}`;
  document.getElementById('confirm-overlay').classList.add('show');
}

function closeConfirm() {
  document.getElementById('confirm-overlay').classList.remove('show');
  pendingOrder = null;
}

async function confirmSubmit() {
  if (!pendingOrder) return;
  const order = pendingOrder;
  pendingOrder = null;
  document.getElementById('confirm-overlay').classList.remove('show');

  try {
    await ordersRef.child(order.id).set(order);
    quantities = {};
    document.getElementById('buyer-name').value = '';
    renderMenu();
    updateSubtotal();
    showToast('✓ 訂單已送出！');
  } catch(e) {
    console.error(e);
    showToast('送出失敗，請重試');
  }
}

function togglePaid(id) {
  const o = orders.find(o => o.id === id);
  if (o) {
    ordersRef.child(id).update({ paid: !o.paid });
  }
}

function deleteOrder(id) {
  if (!confirm('確定刪除此筆訂單？')) return;
  ordersRef.child(id).remove();
}

function setFilter(f) {
  currentFilter = f;
  renderOrders();
}

// ---- STATS ----
function renderStats() {
  const body = document.getElementById('admin-body');
  const total = orders.reduce((s,o) => s + o.total, 0);
  const paid = orders.filter(o => o.paid).length;
  const unpaid = orders.filter(o => !o.paid).length;

  const itemCounts = {};
  orders.forEach(o => o.items.forEach(i => {
    itemCounts[i.name] = (itemCounts[i.name] || 0) + i.qty;
  }));
  const sorted = Object.entries(itemCounts).sort((a,b) => b[1]-a[1]).slice(0, 8);
  const maxQty = sorted[0]?.[1] || 1;

  body.innerHTML = `
    <div class="section-title">統計總覽</div>
    <div class="stat-grid">
      <div class="stat-card"><div class="s-num">${orders.length}</div><div class="s-desc">訂單總數</div></div>
      <div class="stat-card"><div class="s-num">$${total}</div><div class="s-desc">總金額</div></div>
      <div class="stat-card"><div class="s-num" style="color:var(--green)">${paid}</div><div class="s-desc">已付款人數</div></div>
      <div class="stat-card"><div class="s-num" style="color:var(--brown-pale)">${unpaid}</div><div class="s-desc">未付款人數</div></div>
    </div>
    <div class="section-title">熱門品項</div>
    <div class="popular-list">
      ${sorted.length === 0 ? '<div class="empty-msg">尚無資料</div>' : sorted.map(([name, qty]) => `
        <div class="pop-row">
          <span style="width:130px;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${name}</span>
          <div class="pop-bar-wrap"><div class="pop-bar" style="width:${Math.round(qty/maxQty*100)}%"></div></div>
          <span style="font-weight:600;color:var(--brown);width:24px;text-align:right">${qty}</span>
        </div>
      `).join('')}
    </div>
  `;
}

// ---- EXPORT ----
function renderExport() {
  const body = document.getElementById('admin-body');
  let exportText = '目前沒有訂單';
  if (orders.length > 0) {
    const lines = ['椛橙麵包團購訂單', `匯出時間：${new Date().toLocaleString('zh-TW')}`, '='.repeat(30), ''];
    orders.forEach((o, i) => {
      lines.push(`${i+1}. ${o.name}　${o.paid ? '✓已付款' : '□未付款'}`);
      o.items.forEach(it => lines.push(`   ${it.name} × ${it.qty}　= NT$${it.qty * it.price}`));
      lines.push(`   合計：NT$${o.total}`);
      lines.push('');
    });
    lines.push('='.repeat(30));
    const total = orders.reduce((s,o) => s + o.total, 0);
    const paidTotal = orders.filter(o => o.paid).reduce((s,o) => s + o.total, 0);
    lines.push(`訂單總數：${orders.length} 筆`);
    lines.push(`總金額：NT$${total}`);
    lines.push(`已付款：NT$${paidTotal}`);
    lines.push(`未付款：NT$${total - paidTotal}`);
    exportText = lines.join('\n');
  }

  body.innerHTML = `
    <div class="section-title">匯出訂單</div>
    <div class="export-area">
      <textarea id="export-text" readonly>${exportText}</textarea>
      <button class="copy-btn" onclick="copyExport()">複製到剪貼簿</button>
    </div>
    <button class="submit-btn" style="background:var(--red);margin-top:12px" onclick="clearAllOrders()">⚠ 清除所有訂單（新一輪）</button>
  `;
}

function copyExport() {
  const ta = document.getElementById('export-text');
  ta.select();
  document.execCommand('copy');
  showToast('已複製到剪貼簿！');
}

function clearAllOrders() {
  if (!confirm('確定清除所有訂單？此操作無法復原。')) return;
  ordersRef.remove().then(() => {
    showToast('訂單已清除');
    renderExport();
  });
}

// ---- MAIN TABS ----
function switchMain(tab) {
  document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
  document.querySelectorAll('.tab-bar button').forEach(b => b.classList.remove('active'));
  if (tab === 'order') {
    document.getElementById('page-order').style.display = 'block';
    document.querySelectorAll('.tab-bar button')[0].classList.add('active');
  } else if (tab === 'query') {
    document.getElementById('page-query').style.display = 'block';
    document.querySelectorAll('.tab-bar button')[1].classList.add('active');
    document.getElementById('query-name').value = '';
    document.getElementById('query-result').innerHTML = '';
  } else {
    document.getElementById('page-admin').style.display = 'block';
    document.querySelectorAll('.tab-bar button')[2].classList.add('active');
    switchSub(currentSub);
  }
}

function switchSub(sub) {
  currentSub = sub;
  ['list','stats','export'].forEach(s => {
    document.getElementById('stab-' + s).classList.toggle('active', s === sub);
  });
  if (sub === 'list') renderOrders();
  if (sub === 'stats') renderStats();
  if (sub === 'export') renderExport();
}

// ---- TOAST ----
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}
